<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>童谣情绪分析 · 识别图生成器</title>
    <style>
        /* 简单样式，让页面在手机上好看 */
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f9f0f5;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #5a3e4a;
        }
        .button {
            display: inline-block;
            background: #ffaa88;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .button:active {
            transform: scale(0.98);
        }
        .status {
            margin: 20px;
            padding: 15px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            min-height: 80px;
        }
        .emotion-image {
            margin-top: 20px;
            border-radius: 30px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .emotion-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .tip {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>🌙 月光光 · 情绪识别图生成器</h1>
    <p>唱一段童谣，AI会告诉你心情，并给你一张专属的AR识别图～</p>

    <!-- 录音控制按钮 -->
    <div>
        <button class="button" id="startBtn">🎤 开始录音</button>
        <button class="button" id="stopBtn" disabled>⏹️ 停止并分析</button>
    </div>

    <!-- 状态提示区 -->
    <div class="status" id="status">
        👆 点击“开始录音”后唱几句吧
    </div>

    <!-- 情绪识别图展示区（初始隐藏） -->
    <div class="emotion-image hidden" id="imageContainer">
        <img id="emotionImg" src="" alt="情绪识别图">
        <p class="tip" id="imageHint">请用Kivicube扫描上面的图片，进入专属AR世界✨</p>
    </div>

    <script>
        // ========== 需要你修改的配置 ==========
        // 1. 你的SenseVoice API地址（替换成你的真实地址）
        const API_URL = 'https://你的公网IP或域名/transcribe'; 
        
        // 2. 图片文件路径（根据你的实际存放位置修改）
        //    - 如果图片和本html在同一个文件夹，直接写文件名
        //    - 如果在 images 文件夹，写 'images/xxx.png'
        const IMAGE_PATH = 'images/'; // 例如 './' 或 'images/'
        
        // 情绪对应的图片文件名（请确保这些文件存在）
        const emotionImages = {
            HAPPY:   'happy_moon.png',
            SAD:     'sad_moon.png',
            ANGRY:   'angry_moon.png',
            NEUTRAL: 'neutral_moon.png'
        };
        // ===================================

        // ---------- 录音相关变量 ----------
        let mediaRecorder;
        let audioChunks = [];
        let stream;

        // 获取页面元素
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('status');
        const imageContainer = document.getElementById('imageContainer');
        const emotionImg = document.getElementById('emotionImg');
        const imageHint = document.getElementById('imageHint');

        // ---------- 开始录音 ----------
        startBtn.addEventListener('click', async () => {
            try {
                // 请求麦克风权限
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    // 录音停止后发送到API
                    sendAudioToAPI();
                };

                mediaRecorder.start();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusDiv.innerText = '🎙️ 正在录音…… 唱完记得点“停止”';
            } catch (err) {
                statusDiv.innerText = '❌ 无法访问麦克风，请检查权限';
                console.error(err);
            }
        });

        // ---------- 停止录音 ----------
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                // 关闭麦克风
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusDiv.innerText = '⏳ AI正在分析你的情绪…… 请稍候';
            }
        });

        // ---------- 发送音频到API ----------
        async function sendAudioToAPI() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            // ⚠️ 注意：字段名需要和你的API要求的完全一致！
            // 大多数SenseVoice API使用 'file' 或 'audio' 作为字段名
            // 如果不确定，请先测试：用Postman上传文件看看
            formData.append('file', audioBlob, 'recording.webm'); // 这里假设字段名为 file

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error ${response.status}`);
                }

                const result = await response.json();
                console.log('API返回结果：', result);

                // ---------- 解析情绪标签 ----------
                // 根据你的API实际返回格式修改这里的解析逻辑
                // 假设返回的JSON结构为 { emotion: "HAPPY", text: "..." }
                let emotion = 'NEUTRAL'; // 默认中性
                if (result.emotion) {
                    emotion = result.emotion.toUpperCase();
                } else if (result.label) {
                    emotion = result.label.toUpperCase();
                } else if (typeof result === 'string') {
                    emotion = result.toUpperCase();
                }

                // 只保留我们支持的四种情绪
                if (!['HAPPY', 'SAD', 'ANGRY', 'NEUTRAL'].includes(emotion)) {
                    emotion = 'NEUTRAL';
                }

                // ---------- 显示对应的识别图 ----------
                const imgFileName = emotionImages[emotion];
                const imgFullPath = IMAGE_PATH + imgFileName;
                emotionImg.src = imgFullPath;
                imageContainer.classList.remove('hidden'); // 显示图片区域

                // 更新状态提示
                statusDiv.innerText = `✨ 检测到你的情绪是：${emotion === 'HAPPY' ? '开心' : emotion === 'SAD' ? '温柔' : emotion === 'ANGRY' ? '有活力' : '平静'}！`;

            } catch (error) {
                console.error('API调用失败：', error);
                statusDiv.innerText = '😢 网络开小差了，稍后再试吧';
                // 即使失败，也可以显示默认的中性图（可选）
                emotionImg.src = IMAGE_PATH + emotionImages.NEUTRAL;
                imageContainer.classList.remove('hidden');
                imageHint.innerText = '分析失败，先试试中性情绪的场景吧';
            }
        }
    </script>
</body>
</html>
